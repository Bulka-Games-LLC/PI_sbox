<link rel="stylesheet" href="https://bulka-games-llc.github.io/PI_sbox/TemplateData/style.css">
<script src="https://bulka-games-llc.github.io/PI_sbox/Build/NutakuSbox.loader.js"></script>
<script src="https://bulka-games-llc.github.io/PI_sbox/TemplateData/aspect.js"></script>
<script type="text/javascript">
		
let gameInstance;
const balancyData = {};
const buildUrl = 'https://bulka-games-llc.github.io/PI_sbox/Build';
const config   = {
	dataUrl:            buildUrl + '/NutakuSbox.data.unityweb',
	frameworkUrl:       buildUrl + '/NutakuSbox.framework.js.unityweb',
	codeUrl:            buildUrl + '/NutakuSbox.wasm.unityweb',
	streamingAssetsUrl: "https://bulka-games-llc.github.io/PI_sbox/StreamingAssets",
	companyName:        'Bulkagames',
	productName:        'PussyIsland',
	productVersion:     "2.1.3",
	};
			
var canvas;
var bar;
var barParent;
var fullButton;

function init() {
	canvas = document.querySelector("#unity-canvas");
	bar = document.querySelector("#progress-bar-primary");
	barParent = document.querySelector("#logo-div");
	fullButton = document.querySelector("#unity-fullscreen-button");

	refreshNutakuFrame();
	setRootHeight();
	
	createUnityInstance(canvas, config, (progress) => {
		bar.style.width = 100 * progress + "%";
		}).then((unityInstance) => {
			gameInstance = unityInstance;
			barParent.removeChild(bar);
			fullButton.addEventListener("click", () => { gameInstance.SetFullscreen(1);  });
			fullButton.style.display = "block";
			}).catch((message) => {
				alert(message);
				});
}

window.addEventListener('load', init);
</script>

<body style="margin:0;">
	<div id="main" style="height:100%;">
		<div id="logo-div" style="position:absolute; inset:0; z-index:0;">    
		<img src="https://bulka-games-llc.github.io/PI_sbox/TemplateData/bulka-logo.png" style="width:100%;height:100%;object-fit:cover;">
		<img id="progress-bar-primary"
		src="https://bulka-games-llc.github.io/PI_sbox/TemplateData/progress-bar-full.png"
		style="position:absolute; bottom:0; left:0; height:10px; width:0%;">
	</div>
	<div id="webglcontent">
		<div id="unity-container">
			<canvas id="unity-canvas"></canvas>
		</div>
		<div id="unity-fullscreen-button"></div>
	</div>
	</div>
</body>
